<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실시간 채팅</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 480px; }
    h2 { margin-bottom: 16px; color: #333; }

    .join-box { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .join-box input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .join-box button { width: 100%; padding: 10px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }

    .chat-box { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); overflow: hidden; display: none; }
    .chat-header { padding: 14px 16px; background: #4f46e5; color: #fff; font-weight: bold; font-size: 14px; }
    .messages { height: 360px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 8px; font-size: 14px; max-width: 80%; }
    .msg.system { background: #f0f0f0; color: #888; align-self: center; font-size: 12px; max-width: 100%; text-align: center; }
    .msg.mine { background: #4f46e5; color: #fff; align-self: flex-end; }
    .msg.other { background: #f0f0f0; color: #333; align-self: flex-start; }
    .msg .name { font-size: 11px; opacity: 0.7; margin-bottom: 2px; }

    .input-row { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #eee; }
    .input-row input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .input-row button { padding: 10px 16px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>실시간 채팅</h2>

    <div class="join-box" id="joinBox">
      <input id="roomInput" placeholder="채팅방 이름 (예: general)" />
      <input id="userInput" placeholder="닉네임" />
      <button onclick="joinRoom()">입장</button>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="chat-header" id="chatHeader"></div>
      <div class="messages" id="messages"></div>
      <div class="input-row">
        <input id="msgInput" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter' && !event.isComposing) sendMessage()" />
        <button onclick="sendMessage()">전송</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io()
    let myName = ''

    function joinRoom() {
      const room = document.getElementById('roomInput').value.trim()
      const user = document.getElementById('userInput').value.trim()
      if (!room || !user) return alert('채팅방 이름과 닉네임을 입력해주세요.')

      myName = user
      socket.emit('join', room)

      document.getElementById('joinBox').style.display = 'none'
      document.getElementById('chatBox').style.display = 'block'
      document.getElementById('chatHeader').textContent = `#${room}`
      document.getElementById('msgInput').focus()
    }

    function sendMessage() {
      const room = document.getElementById('chatHeader').textContent.slice(1)
      const text = document.getElementById('msgInput').value.trim()
      if (!text) return

      socket.emit('message', { room, user: myName, text })
      document.getElementById('msgInput').value = ''
    }

    socket.on('message', ({ user, text }) => {
      const messages = document.getElementById('messages')
      const div = document.createElement('div')

      if (user === '시스템') {
        div.className = 'msg system'
        div.textContent = text
      } else if (user === myName) {
        div.className = 'msg mine'
        div.textContent = text
      } else {
        div.className = 'msg other'
        div.innerHTML = `<div class="name">${user}</div>${text}`
      }

      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
    })
  </script>
</body>
</html>
