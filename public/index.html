<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Backend Study</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 22px; }
    h2 { font-size: 16px; margin-bottom: 16px; }
    input, textarea { width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    textarea { resize: vertical; }
    button { padding: 8px 16px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { opacity: 0.85; }
    button.secondary { background: #aaa; }
    button.danger { background: #e33; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-info { font-size: 13px; color: #666; }
    .screen { display: none; }
    .screen.active { display: block; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab { padding: 6px 14px; background: #eee; color: #555; border: none; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .tab.active { background: #333; color: #fff; }
    .card { border: 1px solid #eee; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
    .card h3 { margin-bottom: 6px; font-size: 15px; }
    .card p { color: #555; font-size: 14px; margin-bottom: 8px; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; }
    .card-meta small { color: #aaa; font-size: 12px; }
    .card-actions { display: flex; gap: 6px; }
    .auth-form { border: 1px solid #eee; border-radius: 6px; padding: 20px; margin-bottom: 24px; }
    .row { display: flex; gap: 8px; }
    .row input { margin-bottom: 0; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .back-btn { background: none; color: #333; padding: 0; font-size: 14px; }
    .back-btn:hover { opacity: 0.6; }
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .empty { color: #aaa; font-size: 14px; text-align: center; padding: 40px 0; }
  </style>
</head>
<body>

  <!-- 공통 헤더 -->
  <div class="header">
    <h1 style="cursor: pointer;" onclick="goHome()">게시판</h1>
    <div class="header-right">
      <span class="user-info" id="user-info"></span>
      <button class="secondary" id="logout-btn" style="display:none;" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <!-- 홈 화면 -->
  <div id="screen-home" class="screen active">

    <!-- 로그인 폼 (비로그인 시) -->
    <div class="auth-form" id="auth-section">
      <h2>로그인 / 회원가입</h2>
      <div class="row">
        <input id="email" type="email" placeholder="이메일" />
        <input id="password" type="password" placeholder="비밀번호" />
      </div>
      <div style="margin-top: 10px; display: flex; gap: 8px;">
        <button onclick="login()">로그인</button>
        <button class="secondary" onclick="register()">회원가입</button>
      </div>
    </div>

    <!-- 게시글 목록 (로그인 후) -->
    <div id="post-list-section" style="display:none;">
      <div class="top-bar">
        <div class="tabs">
          <button class="tab active" id="tab-all" onclick="setFilter('all')">전체 글</button>
          <button class="tab" id="tab-mine" onclick="setFilter('mine')">내 글</button>
          <button class="tab" id="tab-others" onclick="setFilter('others')">남의 글</button>
        </div>
        <button onclick="goWrite()">+ 작성</button>
      </div>
      <div id="posts"></div>
    </div>

  </div>

  <!-- 상세 화면 -->
  <div id="screen-detail" class="screen">
    <div style="margin-bottom: 20px;">
      <button class="back-btn" onclick="goHome()">← 목록으로</button>
    </div>
    <div id="detail-post"></div>
    <div style="margin-top: 32px;">
      <h2>댓글</h2>
      <div id="detail-comments" style="margin: 12px 0;"></div>
      <div id="comment-form" style="display:none; margin-top: 8px;">
        <textarea id="comment-input" placeholder="댓글을 입력하세요" rows="2"></textarea>
        <button onclick="submitComment()">댓글 작성</button>
      </div>
    </div>
  </div>

  <!-- 작성/수정 화면 -->
  <div id="screen-form" class="screen">
    <div style="margin-bottom: 20px;">
      <button class="back-btn" onclick="goHome()">← 목록으로</button>
    </div>
    <h2 id="form-title">게시글 작성</h2>
    <input id="post-title" placeholder="제목" />
    <textarea id="post-content" placeholder="내용" rows="6"></textarea>
    <div class="form-actions">
      <button onclick="submitPost()">저장</button>
      <button class="secondary" onclick="goHome()">취소</button>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('token')
    let currentUserId = null
    let currentFilter = 'all'
    let editingPostId = null
    let currentPostId = null

    function parseJwt(t) {
      try { return JSON.parse(atob(t.split('.')[1])) } catch { return null }
    }

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
      document.getElementById('screen-' + name).classList.add('active')
    }

    function goHome() {
      editingPostId = null
      currentPostId = null
      showScreen('home')
      loadPosts()
    }

    async function goDetail(postId) {
      currentPostId = postId
      showScreen('detail')
      const post = await api('GET', `/posts/${postId}`)
      const isMine = post.authorId === currentUserId
      const authorLabel = post.author?.email || '알 수 없음'

      document.getElementById('detail-post').innerHTML = `
        <div class="card">
          <h3 style="font-size:18px; margin-bottom:8px;">${post.title}</h3>
          <p style="margin-bottom:12px;">${post.content}</p>
          <div class="card-meta">
            <small>${authorLabel} · ${new Date(post.createdAt).toLocaleString('ko-KR')}</small>
            ${isMine ? `
              <div class="card-actions">
                <button data-id="${post.id}" data-title="${post.title.replace(/"/g, '&quot;')}" data-content="${post.content.replace(/"/g, '&quot;')}" onclick="goEditFromBtn(this)">수정</button>
                <button class="danger" onclick="deletePost(${post.id})">삭제</button>
              </div>` : ''}
          </div>
        </div>
      `
      document.getElementById('comment-form').style.display = token ? 'block' : 'none'
      await loadComments(postId)
    }

    async function loadComments(postId) {
      const comments = await api('GET', `/posts/${postId}/comments`)
      const container = document.getElementById('detail-comments')
      if (!comments.length) {
        container.innerHTML = '<p class="empty" style="padding: 16px 0;">댓글이 없습니다.</p>'
        return
      }
      container.innerHTML = comments.map(c => {
        const isMine = c.authorId === currentUserId
        const authorLabel = c.author?.email || '알 수 없음'
        return `
          <div class="card" style="padding: 12px 16px;">
            <p style="margin-bottom: 6px;">${c.content}</p>
            <div class="card-meta">
              <small>${authorLabel} · ${new Date(c.createdAt).toLocaleString('ko-KR')}</small>
              ${isMine ? `<button class="danger" style="padding: 4px 10px; font-size: 12px;" onclick="deleteComment(${c.id})">삭제</button>` : ''}
            </div>
          </div>
        `
      }).join('')
    }

    async function submitComment() {
      const content = document.getElementById('comment-input').value.trim()
      if (!content) return alert('댓글 내용을 입력해주세요.')
      await api('POST', `/posts/${currentPostId}/comments`, { content })
      document.getElementById('comment-input').value = ''
      await loadComments(currentPostId)
    }

    async function deleteComment(commentId) {
      if (!confirm('댓글을 삭제하시겠습니까?')) return
      await api('DELETE', `/posts/${currentPostId}/comments/${commentId}`)
      await loadComments(currentPostId)
    }

    function goWrite() {
      editingPostId = null
      document.getElementById('form-title').textContent = '게시글 작성'
      document.getElementById('post-title').value = ''
      document.getElementById('post-content').value = ''
      showScreen('form')
    }

    function goEditFromBtn(btn) {
      goEdit(btn.dataset.id, btn.dataset.title, btn.dataset.content)
    }

    function goEdit(id, title, content) {
      editingPostId = id
      document.getElementById('form-title').textContent = '게시글 수정'
      document.getElementById('post-title').value = title
      document.getElementById('post-content').value = content
      showScreen('form')
    }

    function applyLoginState(email) {
      document.getElementById('user-info').textContent = email
      document.getElementById('logout-btn').style.display = 'inline-block'
      document.getElementById('auth-section').style.display = 'none'
      document.getElementById('post-list-section').style.display = 'block'
    }

    if (token) {
      const payload = parseJwt(token)
      currentUserId = payload?.id ?? null
      applyLoginState(localStorage.getItem('email'))
    }

    async function api(method, path, body) {
      const res = await fetch(path, {
        method,
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { Authorization: `Bearer ${token}` } : {})
        },
        body: body ? JSON.stringify(body) : undefined
      })
      return res.json()
    }

    async function register() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const data = await api('POST', '/auth/register', { email, password })
      alert(data.message ?? '회원가입 완료!')
    }

    async function login() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const data = await api('POST', '/auth/login', { email, password })
      if (data.token) {
        token = data.token
        localStorage.setItem('token', token)
        localStorage.setItem('email', email)
        const payload = parseJwt(token)
        currentUserId = payload?.id ?? null
        applyLoginState(email)
        loadPosts()
      } else {
        alert(data.message ?? '로그인 실패')
      }
    }

    function logout() {
      token = null
      currentUserId = null
      localStorage.removeItem('token')
      localStorage.removeItem('email')
      location.reload()
    }

    function setFilter(filter) {
      currentFilter = filter
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      document.getElementById('tab-' + filter).classList.add('active')
      loadPosts()
    }

    async function submitPost() {
      const title = document.getElementById('post-title').value.trim()
      const content = document.getElementById('post-content').value.trim()
      if (!title || !content) return alert('제목과 내용을 입력해주세요.')

      if (editingPostId) {
        await api('PATCH', `/posts/${editingPostId}`, { title, content })
        const returnId = editingPostId
        editingPostId = null
        goDetail(returnId)
      } else {
        await api('POST', '/posts', { title, content })
        goHome()
      }
    }

    async function deletePost(id) {
      if (!confirm('삭제하시겠습니까?')) return
      await api('DELETE', `/posts/${id}`)
      loadPosts()
    }

    async function loadPosts() {
      const data = await api('GET', '/posts')
      let posts = data.posts ?? []

      if (currentFilter === 'mine') {
        posts = posts.filter(p => p.authorId === currentUserId)
      } else if (currentFilter === 'others') {
        posts = posts.filter(p => p.authorId !== currentUserId)
      }

      const container = document.getElementById('posts')
      if (posts.length === 0) {
        container.innerHTML = '<p class="empty">게시글이 없습니다.</p>'
        return
      }

      container.innerHTML = posts.map(post => {
        const isMine = post.authorId === currentUserId
        const authorLabel = post.author?.email || '알 수 없음'
        return `
          <div class="card" style="cursor:pointer;" onclick="goDetail(${post.id})">
            <h3 style="margin-bottom: 6px;">${post.title}</h3>
            <div class="card-meta">
              <small>${authorLabel} · ${new Date(post.createdAt).toLocaleString('ko-KR')}</small>
            </div>
          </div>
        `
      }).join('')
    }

    loadPosts()
  </script>
</body>
</html>
