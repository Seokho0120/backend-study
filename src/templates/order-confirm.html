<!DOCTYPE html>
<html>
<body style="margin: 0; padding: 0; background: #f0f0f0;">
  <table width="600" style="border-collapse: collapse; font-family: Arial, sans-serif; margin: 40px auto;">

    <!-- 헤더 -->
    <tr>
      <td style="background: #1a1a2e; padding: 30px; text-align: center;">
        <h1 style="color: white; margin: 0; font-size: 22px;">주문 확인서</h1>
      </td>
    </tr>

    <!-- 인사말 -->
    <tr>
      <td style="padding: 30px 30px 10px; background: #ffffff;">
        <p style="color: #333; font-size: 16px; margin: 0;">안녕하세요, <strong>{{name}}</strong>님.</p>
        <p style="color: #666; font-size: 14px;">주문이 정상적으로 접수되었습니다.</p>
      </td>
    </tr>

    <!-- 주문 정보 테이블 -->
    <tr>
      <td style="padding: 10px 30px 30px; background: #ffffff;">
        <table width="100%" style="border-collapse: collapse; font-size: 14px;">
          <tr style="background: #f8f8f8;">
            <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold; width: 40%;">주문번호</td>
            <td style="padding: 10px; border: 1px solid #ddd;">{{orderId}}</td>
          </tr>
          <tr>
            <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">상품명</td>
            <td style="padding: 10px; border: 1px solid #ddd;">{{productName}}</td>
          </tr>
          <tr style="background: #f8f8f8;">
            <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">결제금액</td>
            <td style="padding: 10px; border: 1px solid #ddd; color: #e74c3c; font-weight: bold;">{{amount}}원</td>
          </tr>
          <tr>
            <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">주문일시</td>
            <td style="padding: 10px; border: 1px solid #ddd;">{{date}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- 버튼 -->
    <tr>
      <td style="padding: 0 30px 30px; background: #ffffff; text-align: center;">
        <a href="http://localhost:3000/orders/{{orderId}}"
           style="display: inline-block; background: #1a1a2e; color: white;
                  padding: 12px 30px; text-decoration: none; border-radius: 4px; font-size: 14px;">
          주문 상세 보기
        </a>
      </td>
    </tr>

    <!-- 푸터 -->
    <tr>
      <td style="padding: 20px; background: #f0f0f0; text-align: center;">
        <p style="color: #999; font-size: 12px; margin: 0;">© 2026 백엔드 스터디 | 문의: support@backend-study.com</p>
      </td>
    </tr>

  </table>
</body>
</html>
